indexpage:
  title: NetApp Data Migrator-Dokumentation
  summary: NetApp Data Migrator ist eine Enterprise-Grade, Multicloud, Datenmigration
    Softwareapplikation, die die Migration unstrukturierter Dateidaten von lokalen
    oder Storage von Drittanbietern Speichersystemen zu öffentlichen Cloud-Speicherdiensten,
    die von NetApp betrieben werden, vereinfacht. NetApp Data Migrator ist eine unabhängige
    Anwendung, die auf benutzerverwalteten virtuellen Maschinen läuft und den Bedarf
    an komplexen benutzerdefinierten Skripten und voneinander unabhängigen Tools eliminiert.
